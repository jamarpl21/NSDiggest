name: Deploy Production

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifact
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.vars.outputs.artifact_name }}
      release_id: ${{ steps.vars.outputs.release_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Quick validation
        run: |
          python -m compileall src

      - name: Prepare artifact variables
        id: vars
        run: |
          release_id="${GITHUB_REF_NAME}"
          safe_release_id="$(echo "${release_id}" | tr '/' '-')"
          artifact_name="nsdiggest-${safe_release_id}.tar.gz"
          echo "release_id=${safe_release_id}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Build artifact
        run: |
          artifact_path="${RUNNER_TEMP}/${{ steps.vars.outputs.artifact_name }}"
          tar --exclude-vcs \
              --exclude='.env' \
              --exclude='.venv' \
              --exclude='venv' \
              --exclude='data' \
              --exclude='logs' \
              --exclude='.cursor' \
              --exclude='agent-transcripts' \
              -czf "${artifact_path}" .
          mv "${artifact_path}" "${{ steps.vars.outputs.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.artifact_name }}
          path: ${{ steps.vars.outputs.artifact_name }}
          if-no-files-found: error

  deploy-prod:
    name: Deploy to production droplet
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag commit belongs to main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Tag commit is not reachable from origin/main. Refusing deploy."
            exit 1
          fi

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: .

      - name: Configure SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          install -d -m 700 "${HOME}/.ssh"
          printf '%s\n' "${PROD_SSH_KEY}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          printf '%s\n' "${PROD_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"

      - name: Upload artifact to droplet
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          remote_artifact="/tmp/${{ needs.build.outputs.artifact_name }}"
          scp -P "${PROD_SSH_PORT}" \
              "${{ needs.build.outputs.artifact_name }}" \
              "${PROD_SSH_USER}@${PROD_SSH_HOST}:${remote_artifact}"

      - name: Run production deploy script
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          remote_artifact="/tmp/${{ needs.build.outputs.artifact_name }}"
          ssh -p "${PROD_SSH_PORT}" "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "sudo -n /usr/bin/bash /opt/nsdiggest/current/deploy/release_deploy.sh '${{ needs.build.outputs.release_id }}' '${remote_artifact}'"
